name: naijatax_enlighten
description: "NaijaTax Enlighten - Your cross-platform Nigerian Tax companion app."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^17.3.0
  google_nav_bar: ^5.0.6

  # ── Networking ──────────────────────────────────────────────────────────────
  dio: ^5.7.0

  # ── Authentication & Backend (Supabase) ─────────────────────────────────────
  supabase_flutter: ^2.6.0

  # ── Analytics (Firebase) ────────────────────────────────────────────────────
  firebase_core: ^4.11.0
  firebase_analytics: ^12.4.3

  # ── Offline Storage ──────────────────────────────────────────────────────────
  hive_flutter: ^1.1.0

  # ── Biometrics ──────────────────────────────────────────────────────────────
  local_auth: ^3.0.1

  # ── Charts ──────────────────────────────────────────────────────────────────
  fl_chart: ^1.2.0

  # ── PDF Generation & Printing ───────────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1

  # ── Animations ──────────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0

  # ── Typography ──────────────────────────────────────────────────────────────
  google_fonts: ^8.1.0

  # ── File Picker (bank statement upload) ─────────────────────────────────────
  file_picker: ^11.0.2

  # ── Image Picker (profile avatar upload) ─────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # ── Shared Preferences (simple key-value: theme toggle, biometric flag) ──────
  shared_preferences: ^2.3.2

  # ── Utilities ────────────────────────────────────────────────────────────────
  intl: ^0.20.2
  url_launcher: ^6.3.0
  share_plus: ^12.0.2

  # ── UI Enhancements ──────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
